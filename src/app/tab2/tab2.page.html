<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Os Meus Livros</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-list>
    <ion-item *ngFor="let livro of listaLivros" (click)="verDetalhe(livro.id)" button>
      <ion-thumbnail slot="start">
        <img [src]="livro.capa" alt="Capa" />
      </ion-thumbnail>
      <ion-label>
        <h2><strong>{{ livro.titulo }}</strong></h2>
        <p>{{ livro.autor }}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
