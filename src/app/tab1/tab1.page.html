<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Identificação do Autor</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <!-- Cartão de Identificação do Autor -->
  <ion-card class="autor-card">
    <!-- Dados Pessoais -->
    <ion-card-header>
      <ion-card-title class="autor-nome">{{ autor.nome }}</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <!-- Identificação -->
      <div class="info-section">
        <h3 class="section-title">Identificação</h3>
        <ion-list lines="none">
          <ion-item>
            <ion-label>
              <p class="label-text">Data de Nascimento</p>
              <p class="value-text">{{ autor.dataNascimento }}</p>
            </ion-label>
          </ion-item>
          <ion-item>
            <ion-label>
              <p class="label-text">Naturalidade</p>
              <p class="value-text">{{ autor.naturalidade }}</p>
            </ion-label>
          </ion-item>
          <ion-item>
            <ion-label>
              <p class="label-text">Idade</p>
              <p class="value-text">{{ autor.idade }} anos</p>
            </ion-label>
          </ion-item>
        </ion-list>
      </div>

      <!-- Biografia -->
      <div class="info-section">
        <h3 class="section-title">Breve Biografia</h3>
        <p class="biografia-text">{{ autor.biografia }}</p>
      </div>

      <!-- Interesses -->
      <div class="info-section">
        <h3 class="section-title">Interesses</h3>
        <div class="interesses-container">
          <ion-chip *ngFor="let interesse of autor.interesses" color="primary">
            {{ interesse }}
          </ion-chip>
        </div>
      </div>
    </ion-card-content>
  </ion-card>

  <!-- Botões de Navegação -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>
        <ion-icon name="compass-outline"></ion-icon>
        Navega pela Aplicação
      </ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <div class="nav-buttons">
        <ion-button expand="full" routerLink="/tabs/tab2">
          <ion-icon slot="start" name="book"></ion-icon>
          Meus Livros
        </ion-button>
        <ion-button expand="full" routerLink="/tabs/tab3" fill="outline">
          <ion-icon slot="start" name="information-circle"></ion-icon>
          Mais Informações
        </ion-button>
      </div>
    </ion-card-content>
  </ion-card>
</ion-content>
